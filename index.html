<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bobs World (v2.5.59)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
      body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
      
      #loadingUI {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background: #050510; color: white; display: flex; align-items: center; justify-content: center;
          font-family: monospace; z-index: 1000; transition: opacity 0.5s;
      }
      .loader-container { display: flex; flex-direction: column; align-items: center; width: 300px; }
      #loadingText { margin-bottom: 20px; font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #00ffff; }
      #progressBarContainer {
          width: 100%; height: 12px; background: rgba(255,255,255,0.1); 
          border: 1px solid rgba(0,255,255,0.5); border-radius: 6px; position: relative;
      }
      #progressBar { width: 0%; height: 100%; background: #00ffff; border-radius: 5px; transition: width 0.2s ease-out; }
      
      #bobIcon {
          position: absolute; top: -20px; left: 0%; width: 16px; height: 16px;
          background: #1565c0; border-top: 6px solid #b71c1c; border-radius: 2px; 
          transition: left 0.2s ease-out; transform: translateX(-8px);
          animation: wiggle 0.4s infinite alternate; box-shadow: 0 0 10px #00ffff;
      }
      #bobIcon::after {
          content: ''; position: absolute; top: -10px; left: 2px; width: 12px; height: 8px;
          background: #fff; border-radius: 6px 6px 0 0;
      }
      @keyframes wiggle {
          0% { transform: translateX(-8px) rotate(-15deg); }
          100% { transform: translateX(-8px) rotate(15deg); }
      }
      
      #progressPct { font-size: 12px; margin-top: 15px; opacity: 0.7; }
      #batteryUI {
          position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
          width: 200px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid white; 
          border-radius: 5px; z-index: 100; pointer-events: none; overflow: hidden;
      }
      #batteryBar { width: 100%; height: 100%; background: #00ffff; transition: width 0.2s, background 0.2s; }
      #versionTag {
          position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.4);
          font-size: 10px; font-weight: bold; letter-spacing: 2px; pointer-events: none;
          z-index: 100; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      }
      #cineBtn {
          position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px;
          background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.5);
          border-radius: 50%; cursor: pointer; z-index: 100; display: flex;
          align-items: center; justify-content: center; transition: opacity 0.3s, transform 0.1s, background 0.3s;
      }
      #cineBtn::after {
          content: ''; width: 0; height: 0; border-top: 8px solid transparent;
          border-bottom: 8px solid transparent; border-left: 14px solid rgba(255, 255, 255, 0.9); margin-left: 4px;
      }
      #cineBtn.active { background: rgba(255, 204, 0, 0.6); opacity: 0.6; }
      #cineBtn:active { transform: scale(0.9); }
      #firstPersonBtn {
          position: absolute; bottom: 20px; right: 70px; width: 40px; height: 40px;
          background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.5);
          border-radius: 50%; cursor: pointer; z-index: 100; display: flex;
          align-items: center; justify-content: center; transition: opacity 0.3s, transform 0.1s, background 0.3s;
          font-size: 18px; color: rgba(255, 255, 255, 0.9);
      }
      #firstPersonBtn:hover { background: rgba(0, 0, 0, 0.7); }
      #firstPersonBtn.active { background: rgba(0, 150, 255, 0.6); opacity: 0.6; }
      #firstPersonBtn:active { transform: scale(0.9); }
      #seedBtn {
          position: absolute; top: 20px; right: 20px; padding: 8px 12px;
          background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.5);
          color: white; font-size: 10px; font-weight: bold; text-transform: uppercase;
          letter-spacing: 1px; border-radius: 4px; cursor: pointer; z-index: 100; transition: background 0.2s;
      }
      #seedBtn:hover { background: rgba(255, 255, 255, 0.2); }
      #speedVignette {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none; box-shadow: inset 0 0 0px rgba(255, 255, 255, 0);
          transition: box-shadow 0.3s ease; z-index: 5;
      }
      .speeding #speedVignette { box-shadow: inset 0 0 120px rgba(255, 255, 255, 0.6); }
      #timeControl {
          position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
          pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 5px;
          z-index: 10; width: 200px; transition: opacity 0.3s;
      }
      #timeControl.hidden { opacity: 0; pointer-events: none; }
      #timeSlider { width: 100%; accent-color: #ffcc00; cursor: grab; }
      #inventoryModal {
          position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
          background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
          border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; padding: 20px;
          display: none; flex-direction: column; gap: 16px; z-index: 200;
          box-shadow: 0 20px 50px rgba(0,0,0,0.4); pointer-events: auto;
      }
      #inventoryModal.active { display: flex; }
      #closeInv {
          position: absolute; top: 12px; right: 12px; width: 24px; height: 24px;
          background: rgba(255,255,255,0.1); border-radius: 50%; display: flex;
          align-items: center; justify-content: center; color: white; font-weight: bold;
          cursor: pointer; font-size: 14px; border: 1px solid rgba(255,255,255,0.2);
      }
      #closeInv:hover { background: rgba(255,255,255,0.2); }
      .inv-grid { display: grid; grid-template-columns: repeat(9, 38px); grid-template-rows: repeat(3, 38px); gap: 6px; }
      .hotbar-grid { display: grid; grid-template-columns: repeat(9, 38px); gap: 6px; margin-top: 4px; }
      .slot {
          width: 38px; height: 38px; background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; box-sizing: border-box;
          display: flex; align-items: center; justify-content: center; position: relative;
          transition: background 0.2s; overflow: hidden;
      }
      .slot-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
      .item-icon { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
      .item-count {
          position: absolute; bottom: 2px; right: 4px; color: white; font-size: 10px;
          font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none;
      }
      .inv-label { color: rgba(255,255,255,0.6); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 6px; }
      #fpsCounter { position: absolute; top: 15px; left: 15px; color: #00ff00; font-family: monospace; font-size: 14px; font-weight: bold; z-index: 10000; text-shadow: 1px 1px 2px #000; pointer-events: none; }

  </style>
</head>
<body id="body">
  <div id="fpsCounter">FPS: --</div>
  <div id="speedVignette"></div>
  <div id="loadingUI">
      <div class="loader-container">

          <div id="progressBarContainer">

  <div id="timeControl">
      <span style="font-size: 10px; color: white; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Standardized Time</span>
      <input type="range" id="timeSlider" min="0" max="1440" value="1150">

  <div id="inventoryModal">

          <div class="inv-label">Quick Access</div>

  </div>
  <script type="module">
      
      import { hashString, WORLD_SEED, seedRand, F2, G2, dot, grad3, p, perm, permMod12, simplex2D } from './math.js';
      import { createStationTex, createChestTex, createSlatNormalMap, createNoiseTexture, createLeafTexture, createGrassSideTexture, renderDenimSubtle, createBobTexture, createArmPlaidTexture, createGrassTex, createGlowTex, createMoonTex } from './textures.js';
      import { shipX, shipZ, shipY, elevationCache, getBiomeData, isNaturalTreeSpot, getBaseElevation, getRawElevation, findLandingSite, getHighestTerrainY } from './terrain.js';  
      import { Chunk, chunkManager, obstacles, blocksData, grassInstances, walkableMeshes, isSolidBlock, isExposed, initChunkEngine } from './chunking.js';
      import { inventorySlots, buildInventoryUI, updateInventoryUI, addItemToInventory, giveItemOrDrop, countItem, consumeItem, useTool, getBestTool } from './inventory.js';
      import { dropMatsCache, getDropMat, checkResourceRespawn, spawnStick, spawnPebble, spawnDroppedItem, harvestGrass, breakBlock, placeBlock } from './resources.js';
      import { environmentUniforms, commonWobbleGLSL, injectTerrainJitter, injectTerrainDepthJitter, injectWindJitter, wobbleInject } from './shaders.js';
      import { downRaycaster, downVector, getBobTargetY_Raycast, findPath } from './pathfinding.js';

      const _v2A = new THREE.Vector2();
      const _v2B = new THREE.Vector2();
      const _v3A = new THREE.Vector3();
      const _v3B = new THREE.Vector3();
      const _v3W = new THREE.Vector3();
      const _quat = new THREE.Quaternion();

      const SHIP_FLOOR_Y = 3.0;
      const SHIP_ELEV = 0.8;
      
      let shipShaderUniforms = [];
      let glassUniforms = { uEyePitch: { value: 0.0 }, uEyeYaw: { value: 0.0 }, uEyeOpen: { value: 1.0 } };
      
      let hatchGroup = null;
      let hatchMesh = null;
      let amberLights = [];
      let ambientLightsLastUpdate = 0;
      
      const bodyEl = document.getElementById('body');
      const cineBtn = document.getElementById('cineBtn');
      const timeSlider = document.getElementById('timeSlider');
      const timeControl = document.getElementById('timeControl');
      const inventoryModal = document.getElementById('inventoryModal');
      const closeInvBtn = document.getElementById('closeInv');
      
      let undergroundCutoutVal = 0.0;
      let shipCutoutVal = 0.0;

      document.getElementById('seedBtn').addEventListener('click', (e) => {
          e.stopPropagation();
          let input = prompt("Enter an alphanumeric seed (leave blank for random):");
          if (input === null) return; 
          if (input.trim() === '') input = Math.floor(Math.random() * 999999).toString();
          window.location.href = window.location.href.split('?')[0] + '?seed=' + encodeURIComponent(input);
      });

      const CHUNK_SIZE = 16;
      const TEX_RES = 32;
      let shipGroup = null;
      let SPAWN_Y = 0;

      let rotationAngle = Math.PI / 4;
      let zoomLevel = 15;
      let bobState = 'staying';
      const bobTarget = new THREE.Vector3();
      const lookTarget = new THREE.Vector3();
      let targetItem = null;
      let targetBlock = null;
      let harvestTimer = 0;
      let bobVelocityY = 0;
      let bobTimer = 2.0;
      let waitTimer = 0;
      let curiosityTimer = 0;
      let blinkTimer = 2.0;
      let blinkAction = 0;
      let isCinematic = false;
      let isFirstPerson = false;
      let isDraggingTime = false;
      
      let isInitialized = false;
      let physicsEnabled = false;

      let currentPath = [];
      let pathStepIndex = 0;

      const WALK_SPEED = 2.5;
      const TURN_SPEED = 7.0;

      const activePointers = new Map();
      let lastPinchDist = 0;
      let lastTime = 0;
      let gameTime = 1150;
      let currentDay = 0;

      let isHolding = false;
      let holdStartTime = 0;
      let boostActive = false;
      let didRotate = false;

      let battery = 100;
      const batteryBar = document.getElementById('batteryBar');

      function updateBattery(amt) {
          battery = Math.max(0, Math.min(100, battery + amt));
          if(batteryBar) {
              batteryBar.style.width = battery + '%';
              batteryBar.style.background = battery > 20 ? '#00ffff' : '#ff0000';
          }
      }

      const collectibleItems = []; 
      
      const DIRT_MAIN = '#4a3525';
      const DIRT_ALT = '#3b291c';
      const GRASS_MAIN = '#3a5f1b';
      const GRASS_ALT = '#325215';

      let scene, camera, renderer, bob, bodyGroup, eyePivot, sun, ambientLight, marker, moonLight;
      let orthoCamera, perspCamera, fpvCamera;
      let leftArmMover, rightArmMover, leftFlashLight, rightFlashLight, bobThruster;
      
      let windParticles = [], windIndex = 0, dustSpawnTimer = 0;
      let currentWindDir = new THREE.Vector3(1, 0, 0.5).normalize();
      
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      const box = new THREE.BoxGeometry(1, 1, 1);
      
      const frustum = new THREE.Frustum();
      const projScreenMatrix = new THREE.Matrix4();
      
      const globalMats = {};
      const placedMats = {};
      const toolMeshes = {};

      // Crucial links for the separated resource engines
      window.scene = scene; window.bob = bob; window.collectibleItems = collectibleItems;

      function init() {
          scene = new THREE.Scene();
          scene.background = new THREE.Color(0x87ceeb);
          scene.fog = new THREE.Fog(0xffaa55, 60, 110); 
          
          orthoCamera = new THREE.OrthographicCamera(-30, 30, 30, -30, 0.1, 1000);
          perspCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
          fpvCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
          camera = orthoCamera;
          renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });          renderer.setSize(window.innerWidth, window.innerHeight);
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.shadowMap.enabled = true;
          renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          renderer.shadowMap.autoUpdate = true;
          renderer.toneMapping = THREE.ACESFilmicToneMapping;
          renderer.toneMappingExposure = 1.0;
          document.body.appendChild(renderer.domElement);
          
          ambientLight = new THREE.HemisphereLight(0x87ceeb, 0x4a3525, 0.7); 
          scene.add(ambientLight);
          
          sun = new THREE.DirectionalLight(0xfff5e6, 1.0);
          sun.castShadow = true; 
          sun.shadow.autoUpdate = true;
          sun.shadow.mapSize.set(2048, 2048); 
          sun.shadow.camera.left = -40;
          sun.shadow.camera.right = 40;
          sun.shadow.camera.top = 40;
          sun.shadow.camera.bottom = -40;
          sun.shadow.camera.near = 0.1;
          sun.shadow.camera.far = 150;
          sun.shadow.bias = -0.0005; 
          sun.shadow.normalBias = 0.06; 
          sun.target.position.set(shipX, shipY, shipZ);
          scene.add(sun);
          scene.add(sun.target);
          window.sunGlobal = sun;

          moonLight = new THREE.DirectionalLight(0xaaccff, 0.0);
          moonLight.castShadow = true;
          moonLight.shadow.autoUpdate = true;
          moonLight.shadow.mapSize.set(2048, 2048);
          moonLight.shadow.camera.left = -40;
          moonLight.shadow.camera.right = 40;
          moonLight.shadow.camera.top = 40;
          moonLight.shadow.camera.bottom = -40;
          moonLight.shadow.camera.near = 0.1;
          moonLight.shadow.camera.far = 150;
          moonLight.shadow.bias = -0.0005;
          moonLight.shadow.normalBias = 0.06;
          scene.add(moonLight);
          scene.add(moonLight.target);
          window.moonGlobal = moonLight;

          const grassTopTex = createNoiseTexture(GRASS_MAIN, GRASS_ALT);
          const grassSideTex = createGrassSideTexture();
          const dirtTex = createNoiseTexture(DIRT_MAIN, DIRT_ALT);
          const stoneTex = createNoiseTexture('#888888', '#777777');
          const bedrockTex = createNoiseTexture('#222222', '#111111');
          const grassAlphaTex = createGrassTex();

          function makeVoxelMat(textures) {
              const mats = Array.isArray(textures) ? textures.map(t => new THREE.MeshStandardMaterial({ map: t, roughness: 0.9 })) : new THREE.MeshStandardMaterial({ map: textures, roughness: 0.9 });
              if (Array.isArray(mats)) mats.forEach(m => { m.onBeforeCompile = injectTerrainJitter; });
              else mats.onBeforeCompile = injectTerrainJitter;
              return mats;
          }
          const matGrass = makeVoxelMat([grassSideTex, grassSideTex, grassTopTex, dirtTex, grassSideTex, grassSideTex]);
          if (Array.isArray(matGrass)) matGrass.forEach(m => { m.emissive.setHex(0x000000); m.emissiveIntensity = 0; });
          else { matGrass.emissive.setHex(0x000000); matGrass.emissiveIntensity = 0; }
          
          const matDirt = makeVoxelMat(dirtTex);
          const matStone = makeVoxelMat(stoneTex);
          const matBedrock = makeVoxelMat(bedrockTex);
          
          const depthMat = new THREE.MeshDepthMaterial({ depthPacking: THREE.RGBADepthPacking });
          depthMat.onBeforeCompile = injectTerrainDepthJitter;

          const treeTrunkTex = createNoiseTexture('#4e342e', '#3e2723');
          const treeLeafTex = createLeafTexture('#3e6b1d', '#2b4d13');
          const matTrunk = new THREE.MeshStandardMaterial({ map: treeTrunkTex, roughness: 0.9 });
          const matLeaf = new THREE.MeshStandardMaterial({ map: treeLeafTex, roughness: 0.9, transparent: false, alphaTest: 0.5 });
          matLeaf.shadowSide = THREE.DoubleSide; 
          matLeaf.onBeforeCompile = injectWindJitter;
          
          const windDepthMat = new THREE.MeshDepthMaterial({ depthPacking: THREE.RGBADepthPacking });
          
          const windDepthMatLeaf = new THREE.MeshDepthMaterial({ alphaTest: 0.5, map: treeLeafTex, depthPacking: THREE.RGBADepthPacking });
          windDepthMatLeaf.onBeforeCompile = injectWindJitter; 
          
          globalMats.grass = matGrass;
          globalMats.dirt = matDirt;
          globalMats.stone = matStone;
          globalMats.wood = matTrunk;
          globalMats.leaf = matLeaf;
          globalMats.bedrock = matBedrock;
          globalMats.tilled = new THREE.MeshStandardMaterial({color: 0x3e2723, roughness: 0.9});

          window.celestial = {};
          
          // 1. Sun
          const sunGeo = new THREE.SphereGeometry(5, 32, 32);
          const sunMat = new THREE.ShaderMaterial({
              uniforms: { uTime: { value: 0 }, uZenith: { value: 0 }, uColor: { value: new THREE.Vector3(1, 0.8, 0) } },
              vertexShader: `varying vec3 vNormal; void main() { vNormal = normal; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
              fragmentShader: `uniform float uTime; uniform float uZenith; uniform vec3 uColor; varying vec3 vNormal; void main() { float intensity = 1.0 + uZenith * 0.5; float pulse = 0.9 + 0.1 * sin(uTime * 2.0); gl_FragColor = vec4(uColor * intensity * pulse, 1.0); }`,
              side: THREE.FrontSide
          });
          const sunMesh = new THREE.Mesh(sunGeo, sunMat);
          window.celestial.sun = sunMesh;
          scene.add(sunMesh);

          const coronaGeo = new THREE.PlaneGeometry(60, 60);
          const coronaMat = new THREE.MeshBasicMaterial({ map: createGlowTex(), transparent: true, opacity: 0.5, depthWrite: false, blending: THREE.AdditiveBlending });
          const coronaMesh = new THREE.Mesh(coronaGeo, coronaMat);
          window.celestial.corona = coronaMesh;
          scene.add(coronaMesh);

          // 2. Moon
          const moonGeo = new THREE.SphereGeometry(4, 32, 32);
          const moonMat = new THREE.MeshStandardMaterial({ map: createMoonTex(), roughness: 0.9, metalness: 0.1 });
          const moonMesh = new THREE.Mesh(moonGeo, moonMat);
          window.celestial.moon = moonMesh;
          scene.add(moonMesh);

          // 3. Stars
          const starCount = 3000;
          const starGeo = new THREE.BufferGeometry();
          const starPos = new Float32Array(starCount * 3);
          const starSizes = new Float32Array(starCount);
          for(let i=0; i<starCount; i++) {
              const r = 400 + Math.random()*200;
              const theta = Math.random() * Math.PI * 2;
              const phi = Math.acos(2 * Math.random() - 1);
              starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
              starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
              starPos[i*3+2] = r * Math.cos(phi);
              starSizes[i] = 0.5 + Math.random() * 1.5;
          }
          starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
          starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
          const starMat = new THREE.ShaderMaterial({
              uniforms: { uSunY: { value: 0 }, uTime: { value: 0 } },
              vertexShader: `attribute float size; void main() { vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (300.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
              fragmentShader: `uniform float uSunY; uniform float uTime; void main() { float alpha = clamp((-uSunY - 0.1) * 3.0, 0.0, 1.0); float twinkle = sin(uTime * 3.0 + gl_FragCoord.x * 0.1); if (alpha <= 0.0) discard; vec2 coord = gl_PointCoord - vec2(0.5); if(length(coord) > 0.5) discard; gl_FragColor = vec4(1.0, 1.0, 1.0, alpha * (0.7 + 0.3*twinkle)); }`,
              transparent: true
          });
          const starSystem = new THREE.Points(starGeo, starMat);
          window.celestial.stars = starSystem;
          scene.add(starSystem);

          // 4. Clouds
          const cloudCount = 200;
          const cloudGeo = new THREE.BoxGeometry(8, 4, 8);
          const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, flatShading: true });
          const cloudMesh = new THREE.InstancedMesh(cloudGeo, cloudMat, cloudCount);
          const dummy = new THREE.Object3D();
          for(let i=0; i<cloudCount; i++) {
              dummy.position.set((Math.random()-0.5)*600, 70 + (Math.random()-0.5)*10, (Math.random()-0.5)*600);
              dummy.scale.set(1 + Math.random(), 0.5 + Math.random()*0.5, 1 + Math.random());
              dummy.updateMatrix();
              cloudMesh.setMatrixAt(i, dummy.matrix);
          }
          cloudMesh.instanceMatrix.needsUpdate = true;
          window.celestial.clouds = cloudMesh;
          scene.add(cloudMesh);

          placedMats.grass = matGrass;
          placedMats.wood = new THREE.MeshStandardMaterial({ map: treeTrunkTex, roughness: 0.9 });
          placedMats.stone = new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.9 });
          placedMats.stone.onBeforeCompile = wobbleInject;
          placedMats.dirt = new THREE.MeshStandardMaterial({ map: dirtTex, roughness: 0.9 });
          placedMats.dirt.onBeforeCompile = wobbleInject;
          placedMats.tilled = new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 });
          placedMats.tilled.onBeforeCompile = wobbleInject;

          const s = 0.4;
          const hh = 1.0; 
          const gVerts = new Float32Array([
              -s, hh, -s,   s, hh,  s,  -s,  0, -s,   s,  0,  s,
               s, hh, -s,  -s, hh,  s,   s,  0, -s,  -s,  0,  s
          ]);

              function createOctagon(r, h, segs, open) {
                  const geo = new THREE.CylinderGeometry(r, r, h, segs * 8, 6, open);
                  const pos = geo.attributes.position;
                  const ap = r * Math.cos(Math.PI/8);
                  for(let i=0; i<pos.count; i++) {
                      let x = pos.getX(i);
                      let z = pos.getZ(i);
                      let angle = Math.atan2(z, x);
                      let sector = Math.floor(angle / (Math.PI/4));
                      let sectorCenter = sector * (Math.PI/4) + (Math.PI/8);
                      let localAngle = angle - sectorCenter;
                      let newR = ap / Math.cos(localAngle);
                      pos.setX(i, newR * Math.cos(angle));
                      pos.setZ(i, newR * Math.sin(angle));
                  }
                  geo.computeVertexNormals();
                  return geo;
              }

      function updateLightingCycle(sunAngle, sunY, sx, sy, sz, snapX, snapY, snapZ) {
          let aspect = window.innerWidth / window.innerHeight;
          // Fixed shadow size to prevent resizing flicker, large enough for chunk snapping

          // Use a stable Y for shadow target to prevent vertical jitter from terrain/jumping
          const stableY = (typeof shipY !== 'undefined') ? shipY + 3.0 : 10.0;

          // Calculate moon position opposite to sun on the celestial sphere
          let moonAngle = sunAngle + Math.PI;
          let moonY = Math.sin(moonAngle);
          let mx = Math.cos(moonAngle) * 80;
          let my = Math.sin(moonAngle) * 80;
          let mz = Math.cos(moonAngle) * 32;
          let moonShadowY = Math.max(20, Math.abs(my));
          
          if (window.sunGlobal) {
              window.sunGlobal.position.set(snappedX + sx, stableY + shadowY, snappedZ + sz);
              window.sunGlobal.target.position.set(snappedX, stableY, snappedZ);
              window.sunGlobal.target.updateMatrixWorld();
              
              window.sunGlobal.shadow.camera.left = -shadowSize;
              window.sunGlobal.shadow.camera.right = shadowSize;
              window.sunGlobal.shadow.camera.top = shadowSize;
              window.sunGlobal.shadow.camera.bottom = -shadowSize;
              window.sunGlobal.shadow.camera.far = 500;
              window.sunGlobal.shadow.camera.updateProjectionMatrix();
              
              if (environmentUniforms.uSunPos) {
                  environmentUniforms.uSunPos.value.copy(window.sunGlobal.position).sub(window.sunGlobal.target.position).normalize();
              }
              
              if (window.celestial) {
                  // Visuals follow camera to appear infinite (Skybox effect)
                  const cx = camera.position.x;
                  const cy = camera.position.y;
                  const cz = camera.position.z;
                  if (window.celestial.sun) {
                      window.celestial.sun.position.set(cx + sx, cy + sy, cz + sz);
                      window.celestial.sun.material.uniforms.uZenith.value = Math.max(0, sunY);
                  }
                  if (window.celestial.corona) {
                      window.celestial.corona.position.copy(window.celestial.sun.position);
                      window.celestial.corona.lookAt(camera.position);
                      let camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                      let sunDir = new THREE.Vector3().copy(window.celestial.sun.position).sub(camera.position).normalize();
                      let glare = Math.max(0, camDir.dot(sunDir));
                      let s = 40 + glare * 40;
                      window.celestial.corona.scale.set(s, s, 1);
                      window.celestial.corona.material.opacity = 0.3 + glare * 0.4;
                  }
                  if (window.celestial.moon) {
                      window.celestial.moon.position.set(cx + mx, cy + my, cz + mz);
                      window.celestial.moon.rotation.y += 0.001;
                      if (sunY < -0.2) {
                          window.celestial.moon.material.emissive.setHex(0x002244);
                          window.celestial.moon.material.emissiveIntensity = 0.2;
                      } else {

                  if (window.celestial.stars) {

                  if (window.celestial.clouds) {

                      if (sunY < 0) window.celestial.clouds.material.emissive.setHex(0x111122);
                      else window.celestial.clouds.material.emissive.setHex(0x000000);
                  }
              }
          }
          if (environmentUniforms.uSunIntensity) environmentUniforms.uSunIntensity.value = Math.max(0, sunY);
          
          let skyColor = cachedLightingColors.skyColor;
          let groundColor = cachedLightingColors.groundColor;
          let sunLightColor = cachedLightingColors.sunLightColor;
          let moonLightColor = cachedLightingColors.moonLightColor;
          const cNightSky = cachedLightingColors.cNightSky;
          const cNightGround = cachedLightingColors.cNightGround;
          const cTwilightSky = cachedLightingColors.cTwilightSky;
          const cTwilightGround = cachedLightingColors.cTwilightGround;
          const cTwilightSun = cachedLightingColors.cTwilightSun;
          const cGoldenSky = cachedLightingColors.cGoldenSky;
          const cGoldenGround = cachedLightingColors.cGoldenGround;
          const cGoldenSun = cachedLightingColors.cGoldenSun;
          const cDaySky = cachedLightingColors.cDaySky;
          const cDayGround = cachedLightingColors.cDayGround;
          const cDaySun = cachedLightingColors.cDaySun;
          let ambientInt = 0.5;
          let sunInt = 0;
          let moonInt = 0;

          if (sunY > 0.3) {
              let t = Math.min(1, (sunY - 0.3) / 0.7);
              skyColor.copy(cGoldenSky).lerp(cDaySky, t);
              groundColor.copy(cGoldenGround).lerp(cDayGround, t);
              sunLightColor.copy(cGoldenSun).lerp(cDaySun, t);
              sunInt = 0.8 + t * 0.2; 
              ambientInt = 0.5 + t * 0.2; 
          } else if (sunY > 0.0) {
              let t = sunY / 0.3;
              skyColor.copy(cTwilightSky).lerp(cGoldenSky, t);
              groundColor.copy(cTwilightGround).lerp(cGoldenGround, t);
              sunLightColor.copy(cTwilightSun).lerp(cGoldenSun, t);
              sunInt = 0.4 + t * 0.4; 
              ambientInt = 0.45 + t * 0.05; 
          } else if (sunY > -0.2) {
              let t = (sunY + 0.2) / 0.2;
              skyColor.copy(cNightSky).lerp(cTwilightSky, t);
              groundColor.copy(cNightGround).lerp(cTwilightGround, t);
              sunLightColor.copy(cTwilightSun); 
              sunInt = t * 0.4; 
              ambientInt = 0.35 + t * 0.1; 
              moonInt = (1 - t) * 0.8; 
          } else {
              skyColor.copy(cNightSky);

              sunInt = 0;
              ambientInt = 0.35;

          let baseFogNear = 40 + chunkRenderRadiusWorld - 10;

          let targetFogNear = baseFogNear - (fogFactor * 30.0);

          scene.fog.near += (targetFogNear - scene.fog.near) * 0.05;
          scene.fog.far += (targetFogFar - scene.fog.far) * 0.05;
          scene.fog.color.copy(skyColor);

      function getDayWind(day) { let x = Math.sin(day * 12.9898 + WORLD_SEED) * 43758.5453; return x - Math.floor(x); }

      let bootPhase = 0;

                  for(let x = bx - radius; x <= bx + radius; x++) {

                      }

                  let pct = 55 + Math.floor((currentLoaded / targetCount) * 35); 
                  updateUI(`MAPPING TERRAIN (${currentLoaded}/${targetCount})...`, pct);

              for (let i = collectibleItems.length - 1; i >= 0; i--) {

              let cx = Math.floor(bob.position.x / CHUNK_SIZE);

              window.glassUniforms.uEyeOpen.value = eyeOpen;
              
              let lightFactor = 0.1 + Math.max(0, (1.0 - Math.max(0, sunY)) * 0.9);

              else if (bobState === 'staying' || bobState === 'IDLE') { if (window.pathDots) window.pathDots.visible = false; waitTimer -= dt; bodyGroup.rotation.z *= Math.pow(0.95, timeScale); leftArmMover.rotation.x *= Math.pow(0.9, timeScale); rightArmMover.rotation.x *= Math.pow(0.9, timeScale); curiosityTimer -= dt; if(curiosityTimer <= 0) { lookTarget.set(bob.position.x+(Math.random()-0.5)*10, bob.position.y, bob.position.z+(Math.random()-0.5)*10); curiosityTimer = 1.0; } if (waitTimer <= 0 && (typeof missionState !== 'undefined' && missionState === 'done')) { bobState = 'thinking'; bobTimer = 1.0; marker.visible = false; } }

                      if (item.type === 'pebble' && Math.hypot(item.mesh.position.x - bob.position.x, item.mesh.position.z - bob.position.z) < 15) {
                          hasNearbyPebble = true;
                          if (!nearbyPebblePos) nearbyPebblePos = {x: item.mesh.position.x, z: item.mesh.position.z};
                      }
                  }
                  
                  // Decide if Bob needs resources and should seek them
                  let needsSticks = stickCount < 5;
                  let needsPebbles = pebbleCount < 5;
                  let targetResource = null;
                  
                  if (needsSticks && (hasNearbyStick || resourceMemory.stickLocations.length > 0)) {
                      targetResource = nearbyStickPos || resourceMemory.stickLocations[Math.floor(Math.random() * resourceMemory.stickLocations.length)];
                  } else if (needsPebbles && (hasNearbyPebble || resourceMemory.pebbleLocations.length > 0)) {
                      targetResource = nearbyPebblePos || resourceMemory.pebbleLocations[Math.floor(Math.random() * resourceMemory.pebbleLocations.length)];
                  }
                  
                  if (targetResource && bobTimer <= 0) {
                      let path = pathfind(Math.round(bob.position.x), Math.round(bob.position.z), targetResource.x, targetResource.z);
                      if (path && path.length > 1) {
                          currentPath = path;
                          pathStepIndex = 0;
                          bobState = 'walking';
                          bob.targetPosition.copy(currentPath[0]);
                          marker.visible = true;
                          marker.position.set(targetResource.x, getHighestTerrainY(targetResource.x, targetResource.z) - 0.05, targetResource.z);
                          marker.scale.setScalar(0.1);
                      }
                  } else if (bobTimer <= 0) {
                      bobState = 'staying';
                      waitTimer = 2.0;
                      marker.visible = false;
                  }
              }
              
              document.getElementById('versionTag').style.display = isCinematic ? 'none' : 'block';
              
              dustSpawnTimer -= dt; 
              if (dustSpawnTimer <= 0) {
                  let particlesPerSec = 4;
                  if (bobThruster && bobThruster.visible) {
                      particlesPerSec = 60;
                  } else if (bobState.startsWith('walking')) {
                      particlesPerSec = 15;
                  }
                  dustSpawnTimer = 1.0 / particlesPerSec;
                  
                  const p = windParticles[windIndex]; 
                  p.visible = true; 
                  p.userData.life = 1.0; 
                  p.material.opacity = 0.5; 
                  const ang = Math.random() * Math.PI * 2, rad = Math.random() * 0.2; 
                  p.position.set(bob.position.x + Math.cos(ang)*rad, bob.position.y - 0.05 + Math.random() * 0.05, bob.position.z + Math.sin(ang)*rad);
                  
                  let upVel = (bobThruster && bobThruster.visible) ? (Math.random() * 2.0 + 1.0) : (Math.random() * 0.4 + 0.1);
                  p.userData.vel.set(Math.cos(ang) * (Math.random()*0.5+0.2), upVel, Math.sin(ang) * (Math.random()*0.5+0.2)); 
                  p.userData.rotSpeed.set(Math.random()*5, Math.random()*5, Math.random()*5);
                  windIndex = (windIndex + 1) % windParticles.length;
              }
              for(let p of windParticles) if (p.visible) { p.userData.vel.x += currentWindDir.x * windForce * dt * 1.5; p.userData.vel.z += currentWindDir.z * windForce * dt * 1.5; p.position.addScaledVector(p.userData.vel, dt); p.rotation.x += p.userData.rotSpeed.x * dt; p.rotation.y += p.userData.rotSpeed.y * dt; p.userData.life -= dt * 1.5; const s = Math.max(0, p.userData.life); p.scale.setScalar(s); p.material.opacity = s * 0.5; if (p.userData.life <= 0) p.visible = false; }
              
              eyePivot.getWorldPosition(_v3W);
              const lD = lookTarget.clone().sub(_v3W).normalize().applyQuaternion(eyePivot.parent.getWorldQuaternion(_quat).invert());
                  
              let clampedY = Math.max(-1.0, Math.min(1.0, lD.y));
              let tY = Math.atan2(lD.x, lD.z); 
              let tX = -Math.asin(clampedY); 
              if(tY > Math.PI) tY -= Math.PI*2;
              
              if (bobState.startsWith('walking') || bobState === 'WALKING') {
                  tX = 0; tY = 0;
              }
              
              eyePivot.rotation.x += (Math.max(-0.08, Math.min(0.08, tX)) - eyePivot.rotation.x) * dt*8; 
              eyePivot.rotation.y += (Math.max(-0.35, Math.min(0.35, tY)) - eyePivot.rotation.y) * dt*8;
              
              window.glassUniforms.uEyePitch.value = eyePivot.rotation.x;
              window.glassUniforms.uEyeYaw.value = -eyePivot.rotation.y;
              
              if (typeof fpvCamera !== 'undefined' && fpvCamera) { fpvCamera.rotation.set(eyePivot.rotation.x, eyePivot.rotation.y + Math.PI, 0, 'YXZ'); }
              
              bodyGroup.rotation.x += (Math.max(-0.08, Math.min(0.08, tX))*0.8 - bodyGroup.rotation.x) * dt*5; 
              
              updateCamera();
          }
          
          let showHead = !isFirstPerson;
          if (window.bobTop) window.bobTop.visible = showHead;
          if (window.bobInnerTop) window.bobInnerTop.visible = showHead;
          if (window.bobInnerCyl) window.bobInnerCyl.visible = showHead;
          if (window.bobInnerBot) window.bobInnerBot.visible = showHead;
          if (window.glassMesh) window.glassMesh.visible = showHead;
          if (window.eyeScreenMesh) window.eyeScreenMesh.visible = showHead;

          renderer.render(scene, isFirstPerson ? fpvCamera : camera);
      }
window.addEventListener('DOMContentLoaded', () => { 
          init(); 
          animate(0); 
      });
  </script>
</body>
</html>
