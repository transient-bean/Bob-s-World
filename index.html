<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bobs World (v2.5.62)</title>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
  </script>

  <style>
      body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
      
      #loadingUI {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background: #050510; color: white; display: flex; align-items: center; justify-content: center;
          font-family: monospace; z-index: 1000; transition: opacity 0.5s;
      }
      .loader-container { display: flex; flex-direction: column; align-items: center; width: 300px; }
      #loadingText { margin-bottom: 20px; font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #00ffff; }
      #progressBarContainer {
          width: 100%; height: 12px; background: rgba(255,255,255,0.1); 
          border: 1px solid rgba(0,255,255,0.5); border-radius: 6px; position: relative;
      }
      #progressBar { width: 0%; height: 100%; background: #00ffff; border-radius: 5px; transition: width 0.2s ease-out; }
      
      #bobIcon {
          position: absolute; top: -20px; left: 0%; width: 16px; height: 16px;
          background: #1565c0; border-top: 6px solid #b71c1c; border-radius: 2px; 
          transition: left 0.2s ease-out; transform: translateX(-8px);
          animation: wiggle 0.4s infinite alternate; box-shadow: 0 0 10px #00ffff;
      }
      #bobIcon::after {
          content: ''; position: absolute; top: -10px; left: 2px; width: 12px; height: 8px;
          background: #fff; border-radius: 6px 6px 0 0;
      }
      @keyframes wiggle {
          0% { transform: translateX(-8px) rotate(-15deg); }
          100% { transform: translateX(-8px) rotate(15deg); }
      }
      
      #progressPct { font-size: 12px; margin-top: 15px; opacity: 0.7; }
      #batteryUI {
          position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
          width: 200px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid white; 
          border-radius: 5px; z-index: 100; pointer-events: none; overflow: hidden;
      }
      #batteryBar { width: 100%; height: 100%; background: #00ffff; transition: width 0.2s, background 0.2s; }
      #versionTag {
          position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.4);
          font-size: 10px; font-weight: bold; letter-spacing: 2px; pointer-events: none;
          z-index: 100; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      }
      #cineBtn {
          position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px;
          background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.5);
          border-radius: 50%; cursor: pointer; z-index: 100; display: flex;
          align-items: center; justify-content: center; transition: opacity 0.3s, transform 0.1s, background 0.3s;
      }
      #cineBtn::after {
          content: ''; width: 0; height: 0; border-top: 8px solid transparent;
          border-bottom: 8px solid transparent; border-left: 14px solid rgba(255, 255, 255, 0.9); margin-left: 4px;
      }
      #cineBtn.active { background: rgba(255, 204, 0, 0.6); opacity: 0.6; }
      #cineBtn:active { transform: scale(0.9); }
      #firstPersonBtn {
          position: absolute; bottom: 20px; right: 70px; width: 40px; height: 40px;
          background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.5);
          border-radius: 50%; cursor: pointer; z-index: 100; display: flex;
          align-items: center; justify-content: center; transition: opacity 0.3s, transform 0.1s, background 0.3s;
          font-size: 18px; color: rgba(255, 255, 255, 0.9);
      }
      #firstPersonBtn:hover { background: rgba(0, 0, 0, 0.7); }
      #firstPersonBtn.active { background: rgba(0, 150, 255, 0.6); opacity: 0.6; }
      #firstPersonBtn:active { transform: scale(0.9); }
      #seedBtn {
          position: absolute; top: 20px; right: 20px; padding: 8px 12px;
          background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.5);
          color: white; font-size: 10px; font-weight: bold; text-transform: uppercase;
          letter-spacing: 1px; border-radius: 4px; cursor: pointer; z-index: 100; transition: background 0.2s;
      }
      #seedBtn:hover { background: rgba(255, 255, 255, 0.2); }
      #speedVignette {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none; box-shadow: inset 0 0 0px rgba(255, 255, 255, 0);
          transition: box-shadow 0.3s ease; z-index: 5;
      }
      .speeding #speedVignette { box-shadow: inset 0 0 120px rgba(255, 255, 255, 0.6); }
      #timeControl {
          position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
          pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 5px;
          z-index: 10; width: 200px; transition: opacity 0.3s;
      }
      #timeControl.hidden { opacity: 0; pointer-events: none; }
      #timeSlider { width: 100%; accent-color: #ffcc00; cursor: grab; }
      #inventoryModal {
          position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
          background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
          border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; padding: 20px;
          display: none; flex-direction: column; gap: 16px; z-index: 200;
          box-shadow: 0 20px 50px rgba(0,0,0,0.4); pointer-events: auto;
      }
      #inventoryModal.active { display: flex; }
      #closeInv {
          position: absolute; top: 12px; right: 12px; width: 24px; height: 24px;
          background: rgba(255,255,255,0.1); border-radius: 50%; display: flex;
          align-items: center; justify-content: center; color: white; font-weight: bold;
          cursor: pointer; font-size: 14px; border: 1px solid rgba(255,255,255,0.2);
      }
      #closeInv:hover { background: rgba(255,255,255,0.2); }
      .inv-grid { display: grid; grid-template-columns: repeat(9, 38px); grid-template-rows: repeat(3, 38px); gap: 6px; }
      .hotbar-grid { display: grid; grid-template-columns: repeat(9, 38px); gap: 6px; margin-top: 4px; }
      .slot {
          width: 38px; height: 38px; background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; box-sizing: border-box;
          display: flex; align-items: center; justify-content: center; position: relative;
          transition: background 0.2s; overflow: hidden;
      }
      .slot-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
      .item-icon { width: 22px; height: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
      .item-count {
          position: absolute; bottom: 2px; right: 4px; color: white; font-size: 10px;
          font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none;
      }
      .inv-label { color: rgba(255,255,255,0.6); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 6px; }
      #fpsCounter { position: absolute; top: 15px; left: 15px; color: #00ff00; font-family: monospace; font-size: 14px; font-weight: bold; z-index: 10000; text-shadow: 1px 1px 2px #000; pointer-events: none; }
  </style>
</head>
<body id="body">
  <div id="fpsCounter">FPS: --</div>
  <div id="speedVignette"></div>
  <div id="loadingUI">
      <div class="loader-container">
          <div id="loadingText">BOREAS SCANNING...</div>
          <div id="progressBarContainer">
              <div id="progressBar"></div>
              <div id="bobIcon"></div>
          </div>
          <div id="progressPct">0%</div>
      </div>
  </div>
  <div id="batteryUI"><div id="batteryBar"></div></div>
  <div id="cineBtn"></div>
  <div id="firstPersonBtn" title="First Person View">👁</div>
  <button id="seedBtn">Reroll Seed</button>
  <div id="versionTag">v2.5.62</div>
  <div id="timeControl">
      <span style="font-size: 10px; color: white; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Standardized Time</span>
      <input type="range" id="timeSlider" min="0" max="1440" value="1150"> 
  </div>
  <div id="inventoryModal">
      <div id="closeInv">✕</div>
      <div>
          <div class="inv-label">Storage</div>
          <div class="inv-grid" id="mainInventory"></div>
      </div>
      <div>
          <div class="inv-label">Quick Access</div>
          <div class="hotbar-grid" id="hotbarInventory"></div>
      </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
